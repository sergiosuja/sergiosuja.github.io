<div class="navy-line"></div>
<h1><span data-i18n="skills.my_skills">Education</span></h1>

<div class="archive">
	<div class="timeline" id="timeline">
		{% for edu in site.data.index.education %}
		<div class="archive-title bio">
			<div class="archive-year">
				<strong>{{ edu.date }}</strong>
				<br><img src="{{ site.url }}/img/{{edu.icon}}" height="22" width="22" align="left">
				<a href="{{ career.link }}">{{ edu.university }}</a>
				<br>{{ edu.name }}
				<br><i>{{ edu.descr }}</i>
			</div>
		</div>
		{% endfor %}
	</div>
</div>
